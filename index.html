<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Charlie 13 Core</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>

body{
margin:0;
background:#000;
overflow:hidden;
font-family:Arial, sans-serif;
}

canvas{
display:block;
}

#inputBar{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
width:50%;
padding:15px 25px;
border-radius:40px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.05);
color:white;
font-size:16px;
outline:none;
backdrop-filter:blur(10px);
}

#mic{
position:fixed;
bottom:42px;
right:40px;
font-size:26px;
color:white;
cursor:pointer;
opacity:0.8;
}

#mic:hover{
opacity:1;
}

#calc{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.8);
padding:20px;
border-radius:15px;
display:none;
}

#calcScreen{
width:100%;
height:40px;
margin-bottom:10px;
font-size:20px;
background:#000;
color:#0f0;
border:none;
padding:5px;
}

.calcGrid{
display:grid;
grid-template-columns:repeat(4,60px);
gap:8px;
}

.calcGrid button{
height:40px;
background:#222;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<input id="inputBar" placeholder="Charlie activo...">
<div id="mic">🎤</div>
<div id="calc">

<button onclick="cerrarCalculadora()" style="float:right">✖</button>

<input id="calcScreen" readonly>

<div class="calcGrid">

<button onclick="calcAdd('7')">7</button>
<button onclick="calcAdd('8')">8</button>
<button onclick="calcAdd('9')">9</button>
<button onclick="calcAdd('/')">÷</button>

<button onclick="calcAdd('4')">4</button>
<button onclick="calcAdd('5')">5</button>
<button onclick="calcAdd('6')">6</button>
<button onclick="calcAdd('*')">×</button>

<button onclick="calcAdd('1')">1</button>
<button onclick="calcAdd('2')">2</button>
<button onclick="calcAdd('3')">3</button>
<button onclick="calcAdd('-')">−</button>

<button onclick="calcAdd('0')">0</button>
<button onclick="calcAdd('.')">.</button>
<button onclick="calcResult()">=</button>
<button onclick="calcAdd('+')">+</button>

<button onclick="calcAdd('Math.sqrt(')">√</button>
<button onclick="calcAdd('Math.sin(')">sin</button>
<button onclick="calcAdd('Math.cos(')">cos</button>
<button onclick="calcClear()">C</button>

</div>

</div>
<script>

/* =========================
CONFIGURACIÓN BÁSICA
========================= */

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const input = document.getElementById("inputBar");
const mic = document.getElementById("mic");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let center = {x: canvas.width/2, y: canvas.height/2};

/* ===== ARREGLAR RESIZE ===== */

window.addEventListener("resize", () => {

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

center = {
x: canvas.width/2,
y: canvas.height/2
};

});

let vx = 0.2;
let vy = 0.15;

vx += (Math.random()-0.5)*0.02;
vy += (Math.random()-0.5)*0.02;

vx = Math.max(Math.min(vx,0.5),-0.5);
vy = Math.max(Math.min(vy,0.5),-0.5);

let speaking = false;

let baseRadius = 70;
let radius = baseRadius;

let modo = "normal";

let stateColor = {h:200};

let particles = [];

/* =========================
MEMORIA
========================= */

let perfil = {};

function guardarMemoria(){

localStorage.setItem(
"charlie_memoria",
JSON.stringify(perfil)
);

}

function cargarMemoria(){

let data = localStorage.getItem("charlie_memoria");

if(data){

perfil = JSON.parse(data);

}

}

cargarMemoria();

/* =========================
UTILIDADES
========================= */

function limpiar(texto){

return texto
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"");

}

/* =========================
EMOCIONES VISUALES
========================= */

function setEmotion(tipo){

if(tipo==="normal") stateColor.h = 200;
if(tipo==="ventas") stateColor.h = 45;
if(tipo==="emocional") stateColor.h = 280;
if(tipo==="energia") stateColor.h = 10;
if(tipo==="razista") stateColor.h = 0;
}

/* =========================
PARTÍCULAS
========================= */

for(let i=0;i<200;i++){

particles.push({

angle: Math.random()*Math.PI*2,
distance: 120 + Math.random()*140,
speed: 0.0005 + Math.random()*0.001,
size: 1 + Math.random()*2

});

}

/* =========================
MOVIMIENTO NÚCLEO
========================= */

function moveCenter(){

center.x += vx;
center.y += vy;

if(center.x < 200 || center.x > canvas.width-200) vx*=-1;
if(center.y < 200 || center.y > canvas.height-200) vy*=-1;

}

/* =========================
RENDER
========================= */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

moveCenter();

let halo = ctx.createRadialGradient(
center.x,center.y,radius,
center.x,center.y,radius+200
);

halo.addColorStop(0,`hsla(${stateColor.h},100%,60%,0.6)`);
halo.addColorStop(1,"transparent");

ctx.fillStyle = halo;

ctx.beginPath();
ctx.arc(center.x,center.y,radius+200,0,Math.PI*2);
ctx.fill();

let plasma = ctx.createRadialGradient(
center.x,center.y,0,
center.x,center.y,radius
);

plasma.addColorStop(0,"#e6f7ff");
plasma.addColorStop(0.4,`hsl(${stateColor.h},100%,50%)`);
plasma.addColorStop(1,"#001a33");

ctx.fillStyle = plasma;

ctx.beginPath();
ctx.arc(center.x,center.y,radius,0,Math.PI*2);
ctx.fill();

particles.forEach(p=>{

p.angle += p.speed;

let x = center.x + Math.cos(p.angle)*p.distance;
let y = center.y + Math.sin(p.angle)*p.distance;

ctx.fillStyle = `hsla(${stateColor.h},100%,60%,0.8)`;

ctx.beginPath();
ctx.arc(x,y,p.size,0,Math.PI*2);
ctx.fill();

});

if(speaking){

radius = baseRadius + Math.sin(Date.now()*0.006)*10;
if(radius > baseRadius+14) speaking=false;

}else{

radius -= 0.4;

if(radius < baseRadius) radius = baseRadius;

}

requestAnimationFrame(draw);

}

draw();

/* =========================
VOZ
========================= */

let recognition = null;

if ("SpeechRecognition" in window || "webkitSpeechRecognition" in window) {

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

recognition = new SpeechRecognition();
recognition.lang = "es-MX";

} else {

mic.style.display = "none";
console.log("Reconocimiento de voz no soportado");

}

/* =========================
DETECTAR INTENCIÓN
========================= */

function detectarIntencion(text){

let limpio = limpiar(text);

if(/calculadora|calcular/.test(limpio))
return "calculadora";

if(/cerrar calculadora|ocultar calculadora/.test(limpio))
return "cerrar_calc";

if(/precio|cuanto cuesta|cuanto vale|costo/.test(limpio))
return "precio";

if(/beneficio|para que sirve|funciona/.test(limpio))
return "beneficios";

if(/activar modo vendedor|modo vendedor/.test(limpio))
return "modo_vendedor";

if(/modo normal|salir vendedor/.test(limpio))
return "modo_normal";

if(/investigar|buscar|que es/.test(limpio))
return "investigar";

if(/modo razista|activar razista|modo razista/.test(limpio))
return "modo_razista";

if(/chiste|hazme reir|cuenta algo gracioso/.test(limpio))
return "chiste";

return "desconocido";

}

/* =========================
WIKIPEDIA
========================= */

async function investigarWikipedia(tema){

try{

let url =
`https://es.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(tema)}`;

let response = await fetch(url);

let data = await response.json();

if(data.extract){

speak(data.extract);

}else{

speak("No encontré información.");

}

}catch{

speak("Error consultando Wikipedia.");

}

}
/* =========================
MEMORIA DE CONVERSACIÓN
========================= */

let conversacion = [];

let ultimoTema = "";

function recordar(text){

conversacion.push(text);

if(conversacion.length > 10){

conversacion.shift();

}

}
/* =========================
CHISTES
========================= */

const chistes = [

"¿en que se diferencia un judio a una pizza      la pizza nogrita en el horno.",

"¿Qué hace una abeja en el gimnasio? Zum-ba.",

"¿Por qué los programadores confunden Halloween y Navidad? Porque OCT 31 = DEC 25.",

"¿Qué le dice un bit al otro bit? Nos vemos en el bus.",

"¿Por qué el libro de matemáticas estaba triste? Porque tenía demasiados problemas."

];

function contarChiste(){

let chiste = chistes[Math.floor(Math.random()*chistes.length)];

speak(chiste);

}
/* =========================
VOZ SINTETIZADA
========================= */

function speak(text){

speaking = true;

let msg = new SpeechSynthesisUtterance(text);

msg.lang = "es-MX";

speechSynthesis.speak(msg);

}
/* =========================
RESPUESTA
========================= */

function respond(text){

recordar(text);

let intencion = detectarIntencion(text);

switch(intencion){

case "calculadora":

abrirCalculadora();

break;

case "cerrar_calc":

cerrarCalculadora();

speak("Calculadora cerrada");

break;

case "precio":

speak("El precio es de 120 pesos.");

break;

case "beneficios":

speak("Es una pulsera aromática reutilizable.");

break;

case "modo_razista":

modo="razista";

setEmotion("razista");

speak("Modo razista activado.");

break;

case "chiste":

if(modo==="razista"){

contarChiste();

}else{

speak("Activa primero el modo humor.");

}

break;

case "modo_vendedor":

modo="vendedor";

setEmotion("ventas");

speak("Modo vendedor activado.");

break;

case "modo_normal":

modo="normal";

setEmotion("normal");

speak("Modo normal activado.");

break;

case "investigar":

let limpio = limpiar(text);

let tema = limpio
.replace("investigar","")
.replace("que es","")
.replace("buscar","")
.trim();

if(tema===""){
tema = ultimoTema;
}

ultimoTema = tema;

investigarWikipedia(tema);

break;

default:

speak("Sistema activo.");

}

}

/* =========================
INPUT
========================= */

input.addEventListener("keydown",e=>{

if(e.key==="Enter"){

respond(input.value);

input.value="";

}

});

/* =========================
VOZ
========================= */

let escuchando = false;

mic.onclick = () => {

if(escuchando){
recognition.stop();
escuchando = false;
mic.innerText="🎤";
}else{
recognition.start();
escuchando = true;
mic.innerText="🛑";
}

};

recognition.onresult=function(event){

let texto = event.results[event.results.length-1][0].transcript;

input.value = texto;

respond(texto);

};

/* =========================
CALCULADORA
========================= */

let calc = document.getElementById("calc");
let calcScreen = document.getElementById("calcScreen");

function calcAdd(v){
calcScreen.value += v;
}

function calcResult(){

try{

let r = eval(calcScreen.value);

calcScreen.value = r;

speak("Resultado " + r);

}catch{

calcScreen.value="Error";

}

}

function calcClear(){
calcScreen.value="";
}

function abrirCalculadora(){

calc.style.display="block";

speak("Calculadora activada");

}

function cerrarCalculadora(){

calc.style.display="none";

}
document.addEventListener("click",(e)=>{

if(e.target.id==="calc"){
cerrarCalculadora();
}

});
</script>

</body>
</html>
