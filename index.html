<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Charlie - Tu Compañero Personal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin:0; background:#000; overflow:hidden; font-family:Arial,sans-serif; color:white; }
  canvas { display:block; }
  #inputBar { position:fixed; bottom:40px; left:50%; transform:translateX(-50%); width:70%; max-width:800px; padding:15px 25px; border-radius:40px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.08); color:white; font-size:18px; outline:none; backdrop-filter:blur(10px); box-shadow:0 4px 30px rgba(0,0,0,0.5); z-index:10; }
  #mic { position:fixed; bottom:45px; right:15%; font-size:32px; cursor:pointer; opacity:0.7; transition:0.2s; z-index:10; }
  #mic:hover { opacity:1; transform:scale(1.1); }
  #status { position:fixed; top:20px; left:50%; transform:translateX(-50%); font-size:20px; color:#0f0; text-shadow:0 0 10px #0f0; z-index:10; }
  #answer { position:fixed; bottom:110px; left:50%; transform:translateX(-50%); width:70%; max-width:900px; background:rgba(0,0,0,0.6); padding:20px; border-radius:15px; display:none; font-size:17px; line-height:1.5; z-index:5; backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.1); }
  #calc, #resultModal, #baymaxPanel { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; backdrop-filter:blur(10px); justify-content:center; align-items:center; }
  .modal-content, .baymax-content { background:rgba(20,20,50,0.95); border:2px solid #00aaff; border-radius:20px; padding:40px; max-width:700px; width:90%; text-align:center; box-shadow:0 0 60px #00aaff; }
  .modal-content h2 { color:#00aaff; margin-bottom:20px; }
  #baymaxTitle { font-size:48px; color:#00ffff; margin-bottom:20px; animation:glow 2s infinite alternate; }
  @keyframes glow { from { text-shadow:0 0 10px #00ffff; } to { text-shadow:0 0 40px #00ffff; } }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/13.2.0/math.min.js"></script>
</head>
<body>

<canvas id="c"></canvas>
<input id="inputBar" placeholder="Charlie listo... escribe o usa el micrófono">
<div id="mic">🎤</div>
<div id="status">Charlie listo</div>
<div id="answer"></div>

<!-- Calculadora -->
<div id="calc">
  <button onclick="cerrarCalculadora()" style="float:right;background:#f33;color:white;border:none;padding:10px;border-radius:8px;cursor:pointer;">X</button>
  <input id="calcScreen" readonly>
  <div class="calcGrid">
    <button onclick="calcAdd('7')">7</button><button onclick="calcAdd('8')">8</button>
    <button onclick="calcAdd('9')">9</button><button onclick="calcAdd('/')">/</button>
    <button onclick="calcAdd('4')">4</button><button onclick="calcAdd('5')">5</button>
    <button onclick="calcAdd('6')">6</button><button onclick="calcAdd('*')">×</button>
    <button onclick="calcAdd('1')">1</button><button onclick="calcAdd('2')">2</button>
    <button onclick="calcAdd('3')">3</button><button onclick="calcAdd('-')">-</button>
    <button onclick="calcAdd('0')">0</button><button onclick="calcAdd('.')">.</button>
    <button onclick="calcResult()">=</button><button onclick="calcAdd('+')">+</button>
    <button onclick="calcAdd('Math.sqrt(')">√</button><button onclick="calcClear()">C</button>
  </div>
</div>

<!-- Modal BDI -->
<div id="resultModal">
  <div class="modal-content">
    <h2>Resultado BDI-II</h2>
    <div id="puntuacion" style="font-size:28px;color:#0f0;"></div>
    <div id="nivelDepresion" style="font-size:24px;margin:20px 0;padding:15px;border-radius:10px;"></div>
    <div id="recomendaciones" style="text-align:left;"></div>
    <button onclick="document.getElementById('resultModal').style.display='none'" style="margin-top:20px;padding:12px 30px;background:#444;color:white;border:none;border-radius:10px;cursor:pointer;">Cerrar</button>
  </div>
</div>

<!-- Panel Baymax -->
<div id="baymaxPanel">
  <div class="baymax-content">
    <div id="baymaxTitle">ESCANEO EMOCIONAL</div>
    <div id="baymaxContent" style="font-size:22px;margin:30px 0;min-height:100px;"></div>
    <div id="baymaxScale" style="font-size:36px;color:#ffcc00;margin:20px 0;"></div>
    <button onclick="document.getElementById('baymaxPanel').style.display='none'" style="padding:15px 40px;background:#00aaff;color:white;border:none;border-radius:12px;cursor:pointer;">Cerrar</button>
  </div>
</div>

<script>
// ANIMACIÓN NÚCLEO
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let center = {x: canvas.width/2, y: canvas.height/2};
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  center = {x: canvas.width/2, y: canvas.height/2};
});

let vx = 0.2, vy = 0.15;
let speaking = false;
let baseRadius = 70;
let radius = baseRadius;
let stateColor = {h: 200};
let modoBaymax = false;

let particles = [];
for(let i = 0; i < 200; i++) particles.push({angle:Math.random()*Math.PI*2, distance:120+Math.random()*140, speed:0.0005+Math.random()*0.001, size:1+Math.random()*2});

function moveCenter(){center.x+=vx;center.y+=vy;if(center.x<200||center.x>canvas.width-200)vx*=-1;if(center.y<200||center.y>canvas.height-200)vy*=-1;}
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);moveCenter();
  let halo = ctx.createRadialGradient(center.x,center.y,radius,center.x,center.y,radius+200);
  halo.addColorStop(0,`hsla(${stateColor.h},100%,60%,0.6)`);halo.addColorStop(1,"transparent");
  ctx.fillStyle=halo;ctx.beginPath();ctx.arc(center.x,center.y,radius+200,0,Math.PI*2);ctx.fill();
  let plasma = ctx.createRadialGradient(center.x,center.y,0,center.x,center.y,radius);
  plasma.addColorStop(0,"#e6f7ff");plasma.addColorStop(0.4,`hsl(${stateColor.h},100%,50%)`);plasma.addColorStop(1,"#001a33");
  ctx.fillStyle=plasma;ctx.beginPath();ctx.arc(center.x,center.y,radius,0,Math.PI*2);ctx.fill();
  particles.forEach(p => {
    p.angle += p.speed;
    let x = center.x + Math.cos(p.angle)*p.distance;
    let y = center.y + Math.sin(p.angle)*p.distance;
    ctx.fillStyle = `hsla(${stateColor.h},100%,60%,0.8)`;
    ctx.beginPath();ctx.arc(x,y,p.size,0,Math.PI*2);ctx.fill();
  });
  if(speaking){radius = baseRadius + Math.sin(Date.now()*0.006)*10; if(radius > baseRadius+14) speaking = false;}
  else {radius = Math.max(baseRadius, radius - 0.4);}
  if(modoBaymax) { stateColor.h = 220; radius = baseRadius + Math.sin(Date.now()*0.004)*8; }
  requestAnimationFrame(draw);
}
draw();

// VARIABLES GLOBALES
let modoEmocionalActivo = false;
let modoEstudiosActivo = false;
let faseBDI = 0;
let respuestasBDI = [];

// UTILIDADES
function limpiar(texto) { return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim(); }
function speak(text) { speaking = true; let msg = new SpeechSynthesisUtterance(text); msg.lang = "es-MX"; speechSynthesis.speak(msg); }

// PANEL BAYMAX
function mostrarBaymaxPanel(titulo, contenido, escala = '') {
  document.getElementById("baymaxTitle").innerText = titulo;
  document.getElementById("baymaxContent").innerHTML = contenido;
  document.getElementById("baymaxScale").innerHTML = escala ? `ESCALA EMOCIONAL: ${escala}/10` : '';
  document.getElementById("baymaxPanel").style.display = "block";
}
function cerrarBaymaxPanel() { document.getElementById("baymaxPanel").style.display = "none"; }

// MODO EMOCIONAL - BAYMAX
const preguntasBDI = [
  "1. Tristeza\n0 No me siento triste.\n1 Me siento triste gran parte del tiempo.\n2 Me siento triste todo el tiempo.\n3 Me siento tan triste o soy tan infeliz que no puedo soportarlo.",
  "2. Pesimismo\n0 No estoy desalentado respecto de mi futuro.\n1 Me siento más desalentado respecto de mi futuro que lo que solía estarlo.\n2 No espero que las cosas funcionen para mí.\n3 Siento que no hay esperanza para mi futuro y que sólo puede empeorar.",
  "3. Fracaso\n0 No me siento como un fracasado.\n1 He fracasado más de lo que hubiera debido.\n2 Cuando miro hacia atrás, veo muchos fracasos.\n3 Siento que como persona soy un fracaso total.",
  "4. Pérdida de placer\n0 Obtengo tanto placer como siempre por las cosas de las que disfruto.\n1 No disfruto tanto de las cosas como solía hacerlo.\n2 Obtengo muy poco placer de las cosas que solía disfrutar.\n3 No puedo obtener ningún placer de las cosas de las que solía disfrutar.",
  "5. Sentimientos de culpa\n0 No me siento particularmente culpable.\n1 Me siento culpable respecto de varias cosas que he hecho o que debería haber hecho.\n2 Me siento bastante culpable la mayor parte del tiempo.\n3 Me siento culpable todo el tiempo.",
  "6. Sentimientos de castigo\n0 No siento que estoy siendo castigado.\n1 Siento que tal vez pueda ser castigado.\n2 Espero ser castigado.\n3 Siento que estoy siendo castigado.",
  "7. Disconformidad con uno mismo\n0 Siento acerca de mí lo mismo que siempre.\n1 He perdido la confianza en mí mismo.\n2 Estoy decepcionado conmigo mismo.\n3 No me gusto a mí mismo.",
  "8. Autocrítica\n0 No me critico ni me culpo más de lo habitual.\n1 Estoy más crítico conmigo mismo de lo que solía estarlo.\n2 Me critico a mí mismo por todos mis errores.\n3 Me culpo a mí mismo por todo lo malo que sucede.",
  "9. Pensamientos o deseos suicidas\n0 No tengo ningún pensamiento de matarme.\n1 He tenido pensamientos de matarme, pero no lo haría.\n2 Querría matarme.\n3 Me mataría si tuviera la oportunidad de hacerlo.",
  "10. Llanto\n0 No lloro más de lo que solía hacerlo.\n1 Lloro más de lo que solía hacerlo.\n2 Lloro por cualquier pequeñez.\n3 Siento ganas de llorar pero no puedo.",
  "11. Agitación\n0 No estoy más inquieto o tenso que lo habitual.\n1 Me siento más inquieto o tenso que lo habitual.\n2 Estoy tan inquieto o agitado que me es difícil quedarme quieto.\n3 Estoy tan inquieto o agitado que tengo que estar siempre en movimiento o haciendo algo.",
  "12. Pérdida de interés\n0 No he perdido el interés en otras personas o actividades.\n1 Estoy menos interesado que antes en otras personas o cosas.\n2 He perdido casi todo el interés en otras personas o cosas.\n3 Me es difícil interesarme por algo.",
  "13. Indecisión\n0 Tomo mis propias decisiones tan bien como siempre.\n1 Me resulta más difícil que de costumbre tomar decisiones.\n2 Encuentro mucha más dificultad que antes para tomar decisiones.\n3 Tengo problemas para tomar cualquier decisión.",
  "14. Desvalorización\n0 No siento que yo no sea valioso.\n1 No me considero a mí mismo tan valioso y útil como solía considerarme.\n2 Me siento menos valioso cuando me comparo con otros.\n3 Siento que no valgo nada.",
  "15. Pérdida de energía\n0 Tengo tanta energía como siempre.\n1 Tengo menos energía que la que solía tener.\n2 No tengo suficiente energía para hacer demasiado.\n3 No tengo energía suficiente para hacer nada.",
  "16. Cambios en los hábitos de sueño\n0 No he experimentado ningún cambio en mis hábitos de sueño.\n1a Duermo un poco más que lo habitual.\n1b Duermo un poco menos que lo habitual.\n2a Duermo mucho más que lo habitual.\n2b Duermo mucho menos que lo habitual.\n3a Duermo la mayor parte del día.\n3b Me despierto 1-2 horas antes de lo habitual y no puedo volver a dormir.",
  "17. Irritabilidad\n0 No estoy más irritable que lo habitual.\n1 Estoy más irritable que lo habitual.\n2 Estoy mucho más irritable que lo habitual.\n3 Estoy irritable todo el tiempo.",
  "18. Cambios en el apetito\n0 No he experimentado ningún cambio en mi apetito.\n1a Mi apetito es un poco menor que lo habitual.\n1b Mi apetito es un poco mayor que lo habitual.\n2a Mi apetito es mucho menor que antes.\n2b Mi apetito es mucho mayor que antes.\n3a No tengo apetito en absoluto.\n3b Quiero comer todo el día.",
  "19. Dificultad de concentración\n0 Puedo concentrarme tan bien como siempre.\n1 No puedo concentrarme tan bien como habitualmente.\n2 Me es difícil mantener la mente en algo por mucho tiempo.\n3 Encuentro que no puedo concentrarme en nada.",
  "20. Cansancio o fatiga\n0 No estoy más cansado o fatigado que lo habitual.\n1 Me fatigo o me canso más fácilmente que lo habitual.\n2 Estoy demasiado fatigado para hacer muchas de las cosas que solía hacer.\n3 Estoy demasiado fatigado para hacer la mayoría de las cosas que solía hacer.",
  "21. Pérdida de interés en el sexo\n0 No he notado ningún cambio reciente en mi interés por el sexo.\n1 Estoy menos interesado en el sexo de lo que solía estarlo.\n2 Estoy mucho menos interesado en el sexo.\n3 He perdido completamente el interés en el sexo."
];

function iniciarModoEmocional(){
  modoEmocionalActivo = true;
  modoBaymax = true;
  faseBDI = -1;
  respuestasBDI = [];
  speak("Hola. Soy Charlie, tu compañero personal de salud emocional.");
  speak("En una escala del 1 al 10, ¿cómo calificarías tu malestar emocional ahora mismo?");
  mostrarBaymaxPanel("INICIANDO ESCANEO", "Detectando niveles de malestar...<br>Responde con un número del 1 al 10.");
  statusEl.innerText = "Modo Baymax Emocional 💙";
}

function procesarRespuestaBDI(texto){
  if(!modoEmocionalActivo) return;
  let num = parseInt(texto.trim());
  if(isNaN(num)){ speak("Por favor di solo un número."); return; }

  if(faseBDI === -1){
    if(num < 1 || num > 10){ speak("Número entre 1 y 10 por favor."); return; }
    respuestasBDI.push(num);
    speak(`Entendido: ${num}/10. Gracias por ser honesto.`);
    faseBDI = 0;
    mostrarBaymaxPanel("ESCANEO INICIAL", `Malestar detectado: ${num}/10<br>Continuamos con preguntas.`, num);
    setTimeout(siguientePreguntaBDI, 2000);
    return;
  }

  if(num < 0 || num > 3){ speak("Solo 0 al 3 por favor."); return; }
  respuestasBDI.push(num);
  faseBDI++;
  if(num >= 2) speak("Gracias por compartirlo.");
  if(faseBDI < preguntasBDI.length){
    siguientePreguntaBDI();
  } else {
    calcularYMostrarResultadoBDI();
  }
}

function siguientePreguntaBDI(){
  if(faseBDI < preguntasBDI.length){
    speak(preguntasBDI[faseBDI]);
    statusEl.innerText = `Pregunta ${faseBDI+1}/21`;
  } else calcularYMostrarResultadoBDI();
}

function calcularYMostrarResultadoBDI(){
  modoEmocionalActivo = false;
  modoBaymax = false;
  const total = respuestasBDI.reduce((a,b)=>a+b,0);
  speak(`Puntuación: ${total}/63. Gracias por completar el escaneo.`);
  mostrarResultado(total);
}

function mostrarResultado(total){
  let nivel = "", colorBg = "", emoji = "", acciones = "";
  if (total <= 13) {
    nivel = "Depresión mínima"; colorBg = "hsl(200,80%,40%)"; emoji = "😊";
    acciones = "<ul><li>Camina 20-30 min al día</li><li>Respiraciones profundas</li><li>Habla con alguien positivo</li><li>Meditación corta</li></ul>";
  } else if (total <= 19) {
    nivel = "Depresión leve"; colorBg = "hsl(45,100%,50%)"; emoji = "😐";
    acciones = "<ul><li>Ejercicio suave</li><li>Escribe cosas buenas</li><li>Contacta a alguien</li><li>Rutina de sueño</li></ul>";
  } else if (total <= 28) {
    nivel = "Depresión moderada"; colorBg = "hsl(20,100%,50%)"; emoji = "😟";
    acciones = "<ul><li>Llama a SAPTEL 55 5259 8121</li><li>Caminatas diarias</li><li>Técnica 5-4-3-2-1</li></ul>";
  } else {
    nivel = "Depresión grave"; colorBg = "hsl(0,100%,50%)"; emoji = "⚠️";
    acciones = "<ul><li>Contacta ayuda hoy: Línea de la Vida 800 911 2000</li><li>Habla con alguien cercano</li></ul>";
  }

  document.getElementById("puntuacion").innerText = `Puntuación: ${total}/63 | Inicial: ${respuestasBDI[0] || '?'} /10`;
  document.getElementById("nivelDepresion").innerText = `${emoji} ${nivel}`;
  document.getElementById("nivelDepresion").style.background = colorBg;
  document.getElementById("recomendaciones").innerHTML = `<strong>IMPORTANTE:</strong> No es diagnóstico. Consulta profesional.<br><br>${acciones}`;
  document.getElementById("resultModal").style.display = "block";

  let diag = total <= 13 ? "Estable" : total <= 19 ? "Leve" : total <= 28 ? "Moderado" : "Grave";
  mostrarBaymaxPanel("ESCANEO FINAL", `Puntuación ${total}/63`, respuestasBDI[0] || '?');
}

// MODO ESTUDIOS
function iniciarModoEstudios(){
  modoEstudiosActivo = true;
  speak("Modo Estudios activado. ¿Qué quieres aprender?");
  statusEl.innerText = "Modo Estudios 🔥";
  document.getElementById("answer").style.display = "block";
  document.getElementById("answer").innerHTML = "<strong>Dime tu duda o tema.</strong>";
}

function procesarConsultaEstudios(texto){
  let limpio = limpiar(texto);
  document.getElementById("answer").style.display = "block";
  if(/salir/i.test(texto)){
    modoEstudiosActivo = false;
    speak("Modo desactivado.");
    statusEl.innerText = "Modo terminado.";
    document.getElementById("answer").innerHTML = "";
    return;
  }

  if(limpio.includes("traduce")){
    let frase = texto.replace(/traduce/gi,"").trim();
    fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(frase)}&langpair=auto|es`)
      .then(r=>r.json()).then(d=>{
        document.getElementById("answer").innerHTML = `<strong>Traducción:</strong> ${d.responseData.translatedText}`;
        speak(d.responseData.translatedText);
      });
    return;
  }

  if(limpio.includes("calcular") || limpio.includes("matematica")){
    try{
      let expr = texto.replace(/calcular/gi,"").trim();
      let res = math.evaluate(expr);
      document.getElementById("answer").innerHTML = `Resultado: <strong>${res}</strong>`;
      speak(`Resultado: ${res}`);
    }catch(e){
      document.getElementById("answer").innerHTML = "Error en cálculo.";
    }
    return;
  }

  let tema = texto.trim();
  fetch(`https://es.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(tema)}`)
    .then(r=>r.json()).then(d=>{
      document.getElementById("answer").innerHTML = `<strong>${d.title}</strong><br>${d.extract || "No encontrado"}`;
    });
}

// RESPOND
function respond(text){
  let limpio = limpiar(text);
  if(limpio.includes("modo emocional")){
    iniciarModoEmocional();
  } else if(limpio.includes("modo estudios")){
    iniciarModoEstudios();
  } else if(limpio.includes("calculadora")){
    document.getElementById("calc").style.display = "block";
  } else if(modoEmocionalActivo){
    procesarRespuestaBDI(text);
  } else if(modoEstudiosActivo){
    procesarConsultaEstudios(text);
  } else {
    speak("¿En qué te ayudo?");
  }
  document.getElementById("inputBar").value = "";
}

// EVENTOS
document.getElementById("inputBar").addEventListener("keypress", e => {
  if(e.key === "Enter") respond(e.target.value);
});

let recognition = null;
if("SpeechRecognition" in window || "webkitSpeechRecognition" in window){
  recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "es-MX";
  recognition.onresult = e => {
    let text = e.results[0][0].transcript;
    respond(text);
  };
  document.getElementById("mic").onclick = () => recognition.start();
}

// INICIO
speak("¡Hola! Soy Charlie. Di 'modo emocional' o 'modo estudios'.");
</script>
</body>
</html>
