<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Charlie 13 Core</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>

body{
margin:0;
background:#000;
overflow:hidden;
font-family:Arial, sans-serif;
}

canvas{
display:block;
}

#inputBar{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
width:50%;
padding:15px 25px;
border-radius:40px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.05);
color:white;
font-size:16px;
outline:none;
backdrop-filter:blur(10px);
}

#mic{
position:fixed;
bottom:42px;
right:40px;
font-size:26px;
color:white;
cursor:pointer;
opacity:0.8;
}

#mic:hover{
opacity:1;
}

</style>
</head>

<body>

<canvas id="c"></canvas>
<input id="inputBar" placeholder="Charlie activo...">
<div id="mic">🎤</div>

<script>

/* =========================
CONFIGURACIÓN BÁSICA
========================= */

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const input = document.getElementById("inputBar");
const mic = document.getElementById("mic");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let center = {x: canvas.width/2, y: canvas.height/2};

let vx = 0.25;
let vy = 0.2;

let speaking = false;

let baseRadius = 70;
let radius = baseRadius;

let modo = "normal";

let stateColor = {h:200};

let particles = [];

/* =========================
MEMORIA
========================= */

let perfil = {};

function guardarMemoria(){

localStorage.setItem(
"charlie_memoria",
JSON.stringify(perfil)
);

}

function cargarMemoria(){

let data = localStorage.getItem("charlie_memoria");

if(data){

perfil = JSON.parse(data);

}

}

cargarMemoria();

/* =========================
UTILIDADES
========================= */

function limpiar(texto){

return texto
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"");

}

/* =========================
EMOCIONES VISUALES
========================= */

function setEmotion(tipo){

if(tipo==="normal") stateColor.h = 200;
if(tipo==="ventas") stateColor.h = 45;
if(tipo==="emocional") stateColor.h = 280;
if(tipo==="energia") stateColor.h = 10;

}

/* =========================
PARTÍCULAS
========================= */

for(let i=0;i<200;i++){

particles.push({

angle: Math.random()*Math.PI*2,
distance: 120 + Math.random()*140,
speed: 0.0005 + Math.random()*0.001,
size: 1 + Math.random()*2

});

}

/* =========================
MOVIMIENTO NÚCLEO
========================= */

function moveCenter(){

center.x += vx;
center.y += vy;

if(center.x < 200 || center.x > canvas.width-200) vx*=-1;
if(center.y < 200 || center.y > canvas.height-200) vy*=-1;

}

/* =========================
RENDER
========================= */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

moveCenter();

let halo = ctx.createRadialGradient(
center.x,center.y,radius,
center.x,center.y,radius+200
);

halo.addColorStop(0,`hsla(${stateColor.h},100%,60%,0.6)`);
halo.addColorStop(1,"transparent");

ctx.fillStyle = halo;

ctx.beginPath();
ctx.arc(center.x,center.y,radius+200,0,Math.PI*2);
ctx.fill();

let plasma = ctx.createRadialGradient(
center.x,center.y,0,
center.x,center.y,radius
);

plasma.addColorStop(0,"#e6f7ff");
plasma.addColorStop(0.4,`hsl(${stateColor.h},100%,50%)`);
plasma.addColorStop(1,"#001a33");

ctx.fillStyle = plasma;

ctx.beginPath();
ctx.arc(center.x,center.y,radius,0,Math.PI*2);
ctx.fill();

particles.forEach(p=>{

p.angle += p.speed;

let x = center.x + Math.cos(p.angle)*p.distance;
let y = center.y + Math.sin(p.angle)*p.distance;

ctx.fillStyle = `hsla(${stateColor.h},100%,60%,0.8)`;

ctx.beginPath();
ctx.arc(x,y,p.size,0,Math.PI*2);
ctx.fill();

});

if(speaking){

radius += 0.6;

if(radius > baseRadius+12) speaking=false;

}else{

radius -= 0.4;

if(radius < baseRadius) radius = baseRadius;

}

requestAnimationFrame(draw);

}

draw();

/* =========================
VOZ
========================= */

function speak(text){

let msg = new SpeechSynthesisUtterance(text);

msg.lang="es-MX";
msg.rate=0.95;
msg.pitch=1;

msg.onstart=()=> speaking=true;

speechSynthesis.cancel();
speechSynthesis.speak(msg);

}

/* =========================
DETECTAR INTENCIÓN
========================= */

function detectarIntencion(text){

let limpio = limpiar(text);

if(/precio|cuanto/.test(limpio)) return "precio";
if(/beneficio/.test(limpio)) return "beneficios";
if(/modo vendedor/.test(limpio)) return "modo_vendedor";
if(/modo normal/.test(limpio)) return "modo_normal";
if(/investigar/.test(limpio)) return "investigar";

return "desconocido";

}

/* =========================
WIKIPEDIA
========================= */

async function investigarWikipedia(tema){

try{

let url =
`https://es.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(tema)}`;

let response = await fetch(url);

let data = await response.json();

if(data.extract){

speak(data.extract);

}else{

speak("No encontré información.");

}

}catch{

speak("Error consultando Wikipedia.");

}

}

/* =========================
RESPUESTA
========================= */

function respond(text){

let intencion = detectarIntencion(text);

switch(intencion){

case "precio":

speak("El precio es de 120 pesos.");

break;

case "beneficios":

speak("Es una pulsera aromática reutilizable.");

break;

case "modo_vendedor":

modo="vendedor";

setEmotion("ventas");

speak("Modo vendedor activado.");

break;

case "modo_normal":

modo="normal";

setEmotion("normal");

speak("Modo normal activado.");

break;

case "investigar":

let tema = limpiar(text).replace("investigar","").trim();

investigarWikipedia(tema);

break;

default:

speak("Sistema activo.");

}

}

/* =========================
INPUT
========================= */

input.addEventListener("keydown",e=>{

if(e.key==="Enter"){

respond(input.value);

input.value="";

}

});

/* =========================
VOZ
========================= */

const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

recognition.lang="es-MX";

recognition.continuous = true;

mic.onclick=()=> recognition.start();

recognition.onresult=function(event){

let texto = event.results[event.results.length-1][0].transcript;

input.value = texto;

respond(texto);

};

</script>

</body>
</html>
</body>
</html>
